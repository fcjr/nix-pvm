name: build

# Build the PVM kernel and push it to the binary cache. Consumers then substitute
# it instead of compiling. Runs on push and on demand.
on:
  push:
    branches: [main]
  # Rebuild periodically to keep the cache warm and catch breakage from input updates.
  schedule:
    - cron: "0 6 * * 1" # weekly, Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: nix-pvm
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # cachix-action pushes every path built during the job to the cache.
      # -L streams the full build log so tee can capture it for diagnosis.
      - name: Build PVM kernels (host + guest)
        run: |
          set -o pipefail
          nix build .#pvm-kernel .#pvm-guest-kernel -L --print-out-paths 2>&1 | tee /tmp/build.log

      # On failure, surface the real compile error (the default last-25-lines hides
      # it behind the parallel build).
      - name: Show build errors
        if: failure()
        run: |
          echo "===== error lines ====="
          grep -niE "error:|fatal error|undefined reference|: Error [0-9]+|No such file or directory" /tmp/build.log | head -60 || true
          echo "===== last 80 lines ====="
          tail -n 80 /tmp/build.log || true
